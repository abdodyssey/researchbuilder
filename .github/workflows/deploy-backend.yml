name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            export PATH="$HOME/.local/bin:$PATH"
            cd ~/researchbuilder
            git pull origin main
            # Sync deps — pyproject.toml now lives in api/
            cd api && uv sync && cd ..
            # Restart via supervisord (installed via uv tool, lives in ~/.local/bin)
            SUPERVISOR_SOCK="$HOME/.config/supervisor/supervisor.sock"
            if [ -S "$SUPERVISOR_SOCK" ]; then
              supervisorctl -c ~/.config/supervisor/supervisord.conf restart researchbuilder
            else
              supervisord -c ~/.config/supervisor/supervisord.conf
            fi
            sleep 3
            curl -sf http://localhost:9123/ || exit 1
