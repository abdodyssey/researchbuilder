name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'pyproject.toml'
      - 'uv.lock'
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            export PATH="$HOME/.local/bin:$PATH"
            cd ~/researchbuilder
            git pull origin main
            uv sync
            if [ -f .uvicorn.pid ]; then
              kill $(cat .uvicorn.pid) 2>/dev/null || true
              rm -f .uvicorn.pid
              sleep 2
            fi
            nohup .venv/bin/uvicorn api.index:app --host 0.0.0.0 --port 9123 >> uvicorn.log 2>&1 &
            echo $! > .uvicorn.pid
            sleep 3
            curl -sf http://localhost:9123/ || exit 1
